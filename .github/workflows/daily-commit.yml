name: Daily Log

on:
  schedule:
    - cron: '0 9,15,21 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Write daily entry
        run: |
          DATE=$(date +"%Y-%m-%d %H:%M:%S")
          echo "[$DATE] System active." >> activity.log

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: daily log $(date +%Y-%m-%d-%H%M)"
          git push
